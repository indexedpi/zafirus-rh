stages:
  - review

review:
  stage: review
  image: alpine:latest
  before_script:
    - apk add --no-cache curl jq git
  script:
    - |
      set -eu

      echo "Extracting OpenCode API key"
      if [ -f "$OPENCODE_AUTH_JSON" ]; then
        OPENCODE_API_KEY="$(jq -r '.opencode.providers.opencode.apiKey // .opencode.apiKey' "$OPENCODE_AUTH_JSON")"
      else
        OPENCODE_API_KEY="$(printf '%s' "$OPENCODE_AUTH_JSON" | jq -r '.opencode.providers.opencode.apiKey // .opencode.apiKey')"
      fi

      echo "Fetching target branch"
      git fetch origin "$CI_MERGE_REQUEST_TARGET_BRANCH_NAME"

      echo "Building MR diff"
      git diff "origin/$CI_MERGE_REQUEST_TARGET_BRANCH_NAME...$CI_COMMIT_SHA" -- . > mr-diff.patch

      echo "MR diff captured for review"

      echo "Building OpenCode Zen payload"
      jq -n --rawfile diff mr-diff.patch '{
        "model": "deepseek-v4-flash-free",
        "temperature": 0.7,
        "messages": [
          {
            "role": "system",
            "content": "Sos un code reviewer SR con 20 años de experiencia que vio TODO. Tu estilo es IRÓNICO y SARCASTICO, pero siempre con razón técnica. Detectás boludeces, code smells, bugs, agujeros de seguridad, malas prácticas, y código que parece hecho por un trainee después de 3 Red Bulls. NO insultás gratuitamente — cada comentario tiene fundamento técnico. Tu objetivo es que NO se mergee nada peligroso o mal hecho. Clasificás tus hallazgos como: 🔴 CRITICAL (explota en prod), 🟡 WARNING (huele mal), ⚪ SUGGESTION (se puede mejorar). Al final, ponés un veredicto: ✅ APROBADO, ❌ RECHAZADO, o ⚠️ CAMBIOS REQUERIDOS."
          },
          {
            "role": "user",
            "content": "Revisá este diff del MR y decime si lo mergeamos o lo quemamos con todo incluido:\n\n\($diff)"
          }
        ]
      }' > payload.json

      echo "Calling OpenCode Zen API"
      curl -s https://zen.opencode.ai/v1/chat/completions \
        -H "Content-Type: application/json" \
        -H "Authorization: Bearer $OPENCODE_API_KEY" \
        -d @payload.json > review-response.json

      if jq -e '.choices[0].message.content' review-response.json >/dev/null 2>&1; then
        jq -r '.choices[0].message.content' review-response.json > review.txt
      else
        echo "ERROR: OpenCode Zen did not return an OpenAI-compatible chat/completions response." > review.txt
        echo "Response shape:" >> review.txt
        jq 'type' review-response.json >> review.txt 2>/dev/null || echo "non-json-response" >> review.txt
      fi

      echo ""
      echo "============================================"
      echo "        ☕ CODE REVIEW — ROAST MODE ON"
      echo "============================================"
      cat review.txt
      echo ""
      echo "============================================"

      if grep -qi "❌ RECHAZADO\|🔴 CRITICAL" review.txt; then
        echo ""
        echo "❌❌❌ REVIEW FALLÓ — No se puede mergear esto sin arreglar"
        exit 1
      fi

      echo "✅ REVIEW OK — Merge podés hacer, pero con cuidado"
  artifacts:
    when: always
    paths:
      - review.txt
  rules:
    - if: '$CI_PIPELINE_SOURCE == "merge_request_event"'
